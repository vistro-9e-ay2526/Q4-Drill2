<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Index Checker</title>

    <!--BOOTSTRAP-->    
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--EXTERNAL CSS-->    
        <link rel="stylesheet" href="style.css">

    <!--EXTERNAL JS-->
        <script src="main.js"></script>
</head>
<body>
    <form>
        <div class="row">
            <!--LEFT SIDE-->
            <div class="col-sm-8">
                <h3>Heat Index Checker</h3>
                <h4>Notice</h4>
                <div class="dropdown">
                    <p>Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>
                </div>
                <br>
                <h4>Degree in °C</h4>
                <input type="number" placeholder="Enter" id="inputDegree">
                <br>
                <h4>Humidity in %</h4>
                <input type="number" placeholder="Enter" id="inputHumidity">
                <br>
                <button onclick="showHeatIndex()">Check</button>
            </div>
            <!--RIGHT SIDE-->
            <div class="col-sm-4">
                <img src="#" alt="logo">
            </div>
        </div>
    </form>
</body>
</html>
