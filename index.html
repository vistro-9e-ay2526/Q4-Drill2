<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Index Checker</title>

    <!--BOOTSTRAP-->    
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--EXTERNAL CSS-->    
        <link rel="stylesheet" href="style.css">

    <!--EXTERNAL JS-->
        <script src="main.js"></script>
</head>
<body>
    <div class="container-fluid">
        <form>
            <h1>Heat Index Checker</h1>
            <br>
            <h5>⇓ Notice</h5>
            <div class="dropdown">
                <p>Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>
            </div>
            <br>
            <h5>Degree in °C</h5>
            <input type="number" placeholder="Enter" id="inputDegree">
            <br>
            <br>
            <h5>Humidity in %</h5>
            <input type="number" placeholder="Enter" id="inputHumidity">
            <br>
            <br>
        </form>
        <button type="button" onclick="showHeatIndex()">Check</button>
    </div>
</body>
</html>
